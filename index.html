<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>PRO MAX JS OBFUSCATOR</title>
<style>
  body {
    background: #0a0a0a;
    color: #00ff99;
    font-family: Arial;
    padding: 20px;
  }
  textarea {
    width: 100%;
    height: 180px;
    background: #111;
    color: #00ff99;
    border: 1px solid #333;
    padding: 10px;
  }
  button {
    margin-top: 10px;
    padding: 10px;
    background: #00ff99;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
  pre {
    margin-top: 15px;
    background: #000;
    padding: 10px;
    white-space: pre-wrap;
    border: 1px solid #333;
  }
</style>
</head>
<body>

<h2>🔥 PRO MAX JavaScript Obfuscator</h2>

<textarea id="input" placeholder="Masukkan JS kamu..."></textarea>
<br>
<button onclick="obfuscate()">OBFUSCATE PRO MAX</button>

<pre id="output"></pre>

<script>
function rand() {
  return "_0x" + Math.random().toString(16).slice(2,10);
}

// ubah string ke hex array
function encode(str) {
  return str.split("").map(c => c.charCodeAt(0));
}

function obfuscate() {
  let code = document.getElementById("input").value;

  if (!code.trim()) {
    document.getElementById("output").innerText = "Isi dulu kodenya!";
    return;
  }

  let arrName = rand();
  let fnName = rand();
  let idx = rand();

  let encoded = encode(code);

  let result = `
(function(){
  var ${arrName} = [${encoded.join(",")}];

  var ${fnName} = function(a){
    var r = "";
    for(var ${idx}=0; ${idx}<a.length; ${idx}++){
      r += String.fromCharCode(a[${idx}]);
    }
    return r;
  };

  new Function(${fnName}(${arrName}))();
})();
  `.trim();

  document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
